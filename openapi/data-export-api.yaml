  # ────────────────────────────────────────────────────────────────
  # 子设备入网
  # ────────────────────────────────────────────────────────────────
  /gateways/subdevices/join:
    post:
      tags: [Gateway]
      summary: 子设备入网
      description: |
        通过网关发起子设备入网，通过 commandCode 区分入网方式：
        - APIEnableSubdeviceJoining: 普通zigbee入网（如三击入网）
        - APIBindBleDeviceToHub: MagicPair方式zigbee入网（数据内容参考云端接口：http://119.91.67.180/project/295/interface/api/51901）
        - APIPushMatterBindInfo: Matter子设备入网
      operationId: joinSubdevice
      x-skill-intent: gateway.subdevice.join
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubdeviceJoinRequest'
            examples:
              zigbeeJoin:
                summary: 普通zigbee入网
                value:
                  gatewayId: "gateway001"
                  commandCode: APIEnableSubdeviceJoining
              magicpairJoin:
                summary: magicpair方式zigbee入网
                value:
                  gatewayId: "gateway001"
                  commandCode: APIBindBleDeviceToHub
                  data:
                    shortAddr: 65534
                    mac: "54EF4410003604C9"
                    manufacturerCode: 4447
                    fwVer: "0.0.0_0030"
                    model: "lumi.light.acn014"
                    did: "lumi.54ef4410003604c9"
                    devType: 142
                    hdVer: 1
                    zbVer: "3"
                    pid: "lumi1.54ef442dcd15"
              matterJoin:
                summary: Matter子设备入网
                value:
                  gatewayId: "gateway001"
                  commandCode: APIPushMatterBindInfo
                  data:
                    code: "04036408297"
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubdeviceJoinResponse'
              examples:
                success:
                  value:
                    type: SubdeviceJoinResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                fail:
                  value:
                    type: SubdeviceJoinResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfa"
                    code: 2201
                    message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

