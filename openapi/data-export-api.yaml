openapi: 3.0.3
info:
  title: Data Export API
  termsOfService: https://domain.com/terms
  x-internal: true
  description: |
    Data Export API 开放接口文档

    ## 公共请求头
    所有接口均需携带以下 Header 参数（由客户端统一附加）：
    | Header | 必填 | 说明 |
    |--------|------|------|
    | Authorization | 是 | `Bearer accessToken` |
    | Content-Type | 是 | `application/json` |
  version: v1

servers:
  - url: '{host}/open/api/v1'
    description: Data Export API Endpoint
    variables:
      host:
        description: |
          请输入您的 Aqara Studio 服务地址，可为本地局域网地址 (http) 或远程访问地址 (https)。
          例如：
          - http://10.11.50.56
          - https://xxx.edge-xxx.aqara.com/
        default: 'http://<Local-LAN-IP>'

# 全局安全：除 /login/pubkey、/login 外均需 Bearer Token
security:
  - BearerAuth: []

tags:
  - name: Auth
    description: 鉴权相关接口（登录、刷新令牌、登出）
  - name: Space
    description: 空间层级查询接口
  - name: Device
    description: 设备查询、属性读写与命令执行接口
  - name: Gateway
    description: 网关查询接口
  - name: Automation
    description: 自动化创建、编辑、查询、删除与能力查询接口

paths:

  # ────────────────────────────────────────────────────────────────
  # 获取临时RSA公钥
  # ────────────────────────────────────────────────────────────────
  /auth/login/pubkey:
    get:
      tags: [Auth]
      summary: 获取临时 RSA 公钥
      operationId: getPublicKey
      x-skill-intent: auth.bootstrap
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      security: []
      parameters:
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/SysType'
        - $ref: '#/components/parameters/PhoneModel'
        - $ref: '#/components/parameters/DeviceUniqueId'
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Nonce'
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PubKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 登录
  # ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      operationId: login
      x-skill-intent: auth.login
      x-idempotent: false
      x-retryable: false
      x-side-effects: session_create
      security: []
      parameters:
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/SysType'
        - $ref: '#/components/parameters/PhoneModel'
        - $ref: '#/components/parameters/DeviceUniqueId'
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Nonce'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              passwordLogin:
                value:
                  account: demo@example.com
                  password: "base64-rsa-ciphertext"
                  keyId: "temporary-key-id"
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                loginSuccess:
                  value:
                    type: LoginResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf6"
                    code: 0
                    message: success
                    data:
                      user:
                        userId: "u1001"
                        nickName: demo-user
                        email: demo@example.com
                      accessToken: "eyJhbGciOi..."
                      refreshToken: "eyJhbGciOi..."
                      expiresIn: 86400
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 刷新Token
  # ────────────────────────────────────────────────────────────────
  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: 刷新 Token
      operationId: refreshToken
      x-skill-intent: auth.refresh
      x-idempotent: false
      x-retryable: false
      x-side-effects: token_rotate
      security: []
      parameters:
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/SysType'
        - $ref: '#/components/parameters/PhoneModel'
        - $ref: '#/components/parameters/DeviceUniqueId'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Nonce'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 登出
  # ────────────────────────────────────────────────────────────────
  /auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      operationId: logout
      x-skill-intent: auth.logout
      x-idempotent: true
      x-retryable: true
      x-side-effects: session_revoke
      parameters:
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/SysType'
        - $ref: '#/components/parameters/PhoneModel'
        - $ref: '#/components/parameters/DeviceUniqueId'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/Lang'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Nonce'
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询空间列表
  # ────────────────────────────────────────────────────────────────
  /spaces:
    get:
      tags: [Space]
      summary: 查询空间列表
      description: 查询指定父空间下的所有子空间，可选包含父空间自身，满足灵活的空间层级查询需求。
      operationId: getSpaces
      x-skill-intent: space.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: parentSpaceId
          in: query
          description: 父空间 ID。为空时返回所有顶级空间（即没有父空间的空间，属于空间树的根节点）。
          required: false
          schema:
            type: string
        - name: needChildren
          in: query
          description: 是否查询父空间下的子空间。若 parentSpaceId 非空且 needChildren 为 false，则不返回子空间（仅在 needParentSpaceSelf 为 true 时可返回父空间自身）。
          required: false
          schema:
            type: boolean
            default: true
        - name: needParentSpaceSelf
          in: query
          description: 是否包含 parentSpaceId 对应的父空间自身。仅当 parentSpaceId 非空时生效。
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpacesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询DeviceType集合
  # ────────────────────────────────────────────────────────────────
  /devices/types:
    get:
      tags: [Device]
      summary: 查询设备类型列表
      description: 获取 Aqara Studio 现有的所有设备类型（DeviceType）。
      operationId: getDeviceTypes
      x-skill-intent: device.type.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查设备信息列表
  # ────────────────────────────────────────────────────────────────
  /devices:
    get:
      tags: [Device]
      summary: 查设备信息列表
      description: 获取指定空间下的设备列表，支持分页和过滤条件。
      operationId: getDevices
      x-skill-intent: device.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: spaceIds
          in: query
          description: 空间 ID 列表。示例：spaceIds=xx1,xx2 或 spaceIds=xx1&spaceIds=xx2。为空查询所有设备
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: needChildren
          in: query
          description: 是否需要查询子空间下的设备。仅当 spaceIds 不为空时，本参数才有用
          required: false
          schema:
            type: boolean
            default: false
        - name: spaceAssociated
          in: query
          description: 是否查询 spaceIds 指定空间下的设备。<ul><li>true：仅查询指定空间下的设备；</li><li>false：仅查询非指定空间下的设备（此时 spaceIds 和 needChildren 参数无效）；</li><li>不填：<ul><li>当 spaceIds 为空时，默认查询所有设备；</li><li>当 spaceIds 不为空时，默认查询指定空间下的设备。</li></ul></li></ul>
          required: false
          schema:
            type: boolean
            nullable: true
        - name: state
          in: query
          description: 设备在线状态。<ul><li>true：查询在线设备。</li><li>false：查询离线设备。</li><li>不填：不筛选。</li></ul>
          required: false
          schema:
            type: boolean
            nullable: true
        - name: deviceTypesList
          in: query
          description: 设备类型列表。示例：deviceTypesList=light,switch 或 deviceTypesList=light&deviceTypesList=switch
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: orderBy
          in: query
          description: 排序方式。<ul><li>createTime asc：按创建时间升序排序。</li><li>createTime desc：按创建时间降序排序。</li></ul>
          required: false
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - name: pageNum
          in: query
          description: 页码
          required: false
          schema:
            type: integer
          example: 1
        - name: pageSize
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
          example: 200
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
              examples:
                devicesPage:
                  value:
                    type: GetDeviceInfoResponse
                    version: v1
                    msgId: "1751609244328"
                    code: 0
                    message: success
                    data:
                      totalCount: 3
                      pageNum: 1
                      pageSize: 200
                      data:
                        - deviceId: "device-001"
                          deviceName: "客厅灯"
                          deviceTypesList: ["light"]
                          createTime: 1710001234567
                          state: true
                          space:
                            parentSpaceId: "space-home-001"
                            spaceId: "space-room-001"
                            name: "客厅"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询设备定义（设备详细信息）
  # ────────────────────────────────────────────────────────────────
  /devices/definitions:
    get:
      tags: [Device]
      summary: 查询设备详细信息
      description: 获取指定设备的详细信息，包括设备类型、端点列表、属性列表等。
      operationId: getDeviceDefinitions
      x-skill-intent: device.definition.get
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: deviceIds
          in: query
          required: true
          description: 设备 ID 列表。示例：deviceIds=xx1,xx2 或 deviceIds=xx1&deviceIds=xx2
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDefinitionsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 控制设备 / 设备更换房间 / 设备改名和更换房间
  # ────────────────────────────────────────────────────────────────
  /devices/trait/execute:
    post:
      tags: [Device]
      summary: 通过 Trait 控制设备
      description: |
        通过 Trait 控制设备，包括如下操作：
        - 更新属性（如开关、温度等，functionCode 与 traitCode 请调用 /devices/definitions 接口查询）
        - 更换设备所在房间（functionCode="EndpointLabel", traitCode="EndpointRoom"）
        - 改名（functionCode="EndpointLabel", traitCode="EndpointName"）
      operationId: executeDeviceTrait
      x-skill-intent: device.trait.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitExecuteRequest'
            examples:
              executeOnOff:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCode: OnOff
                      value: true
      responses:
        '200':
          description: 请求发起成功，但不代表所有 trait value 设置成功。<br />code 为 0 表示至少部分成功；code 不为 0 表示全部失败。<br/>若 data 存在，表示为设置失败的 trait 集合，若无则全部成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitExecuteResponse'
              examples:
                partialFailed:
                  value:
                    type: ExecuteTraitResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf7"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        code: 1103
                        message: device offline
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询trait功能值
  # ────────────────────────────────────────────────────────────────
  /devices/trait/read:
    post:
      tags: [Device]
      summary: 查询 Trait 值
      description: 批量查询指定 trait 的当前值。
      operationId: getTraitValues
      x-skill-intent: device.trait.read
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitReadRequest'
            examples:
              readTraits:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCodes: [OnOff]
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitValueResponse'
              examples:
                traitValueSuccess:
                  value:
                    type: GetTraitValueResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf8"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        value: true
                        time: 1710001234567
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # command下发设备
  # ────────────────────────────────────────────────────────────────
  /devices/command/execute:
    post:
      tags: [Device]
      summary: 通过 Command 控制设备
      description: |
        通过 Command 实现对设备的功能控制。    
        所需 endpointId、functionCode、commandCode、fieldCode 等参数请先通过 /devices/definitions 接口获取后传入本接口进行执行。
      operationId: executeDeviceCommand
      x-skill-intent: device.command.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
            examples:
              executeCommand:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
      responses:
        '200':
          description: 请求发起成功，但不代表所有 command 执行成功。<br />code 为 0 表示至少部分成功；code 不为 0 表示全部失败。<br/>若 data 存在，表示为执行失败的 command 集合，若无则全部成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
              examples:
                commandFailed:
                  value:
                    type: ExecuteCommandResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway001"
                        endpointId: 1
                        functionCode: HubCoordination
                        commandCode: APIBindSubdeviceWithSecurityCode
                        code: 2201
                        message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'


  # ────────────────────────────────────────────────────────────────
  # 查询网关列表
  # ────────────────────────────────────────────────────────────────
  /gateways:
    get:
      tags: [Gateway]
      summary: 查询网关列表
      description: |
        查询 Aqara Studio 内的所有 Matter 和 Zigbee 网关。    
        :::tip
        当前 Zigbee 网关支持接入部分 Zigbee 设备，具体支持的设备型号请参阅 [可接入 Aqara 设备清单](https://docs.aqara.com/zh/docs/aqara-studio/overview/compatible-aqara-devices)。
   
        :::
      operationId: getGateways
      x-skill-intent: gateway.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: state
          in: query
          description: 网关在线状态。true：在线；false：离线。
          required: false
          schema:
            type: boolean
        - name: protocols
          in: query
          description: 协议类型列表。URL 示例：protocols=zigbee,matter 或 protocols=zigbee&protocols=matter
          required: false
