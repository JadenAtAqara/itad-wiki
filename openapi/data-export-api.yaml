  # ────────────────────────────────────────────────────────────────
  # 查询网关入网结果
  # ────────────────────────────────────────────────────────────────
  /gateways/connect/result:
    get:
      tags: [Gateway]
      summary: 查询网关入网结果
      description: |
        查询网关入网操作的结果。传 deviceIds 时查询指定网关的入网结果；
        不传 deviceIds 时根据 bindTime 查询该时间之后所有发起过入网的网关及其结果。
        入网失败时响应仅包含 deviceId、code、message；
        入网成功时额外返回 deviceName、supportZigbee、supportedMatterRoles、space、bindTime。
      operationId: getGatewayConnectResult
      x-skill-intent: gateway.connect.result
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: deviceIds
          in: query
          description: 网关设备ID集合。URL 示例：deviceIds=xx1,xx2 或 deviceIds=xx1&deviceIds=xx2。缺省时根据 bindTime 查询该时间之后入网的网关
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: bindTime
          in: query
          description: 开始入网时间（毫秒级 UTC 时间戳），即发起入网操作的时间点，作为查询起点
          required: true
          schema:
            type: integer
            format: int64
          example: 1710001234567
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayConnectResultResponse'
              examples:
                resultSuccess:
                  value:
                    type: GatewayConnectResultResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfa"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway-001"
                        deviceName: "客厅网关"
                        supportZigbee: true
                        supportedMatterRoles: 1
                        code: 0
                        message: null
                        bindTime: 1710001234999
                      - deviceId: "gateway-002"
                        code: 3001
                        message: "connection timeout"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

