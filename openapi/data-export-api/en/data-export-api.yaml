openapi: 3.0.3
info:
  title: Data Export API
  termsOfService: https://domain.com/terms
  x-internal: true
  description: |
    Data Export API Documentation

    ## Common Request Headers
    All APIs require the following header parameters:
    | Header | Required | Description |
    |--------|----------|-------------|
    | Authorization | Yes | `Bearer accessToken` |
    | Content-Type | Yes | `application/json` |
  version: v1

servers:
  - url: '{host}/open/api/v1'
    description: Data Export API endpoint
    variables:
      host:
        description: |
          Please enter your Aqara Studio service address. This can be a local LAN address (http) or a remote access address (https).
          For example:
          - http://10.11.50.56
          - https://xxx.edge-xxx.aqara.com/
        default: '<Aqara_Studio_URL>'

# Global Security: All endpoints require Bearer Token
security:
  - BearerAuth: []

tags:
  - name: Space
    description: APIs for space query
  - name: Device
    description: APIs for device query, properties read/write, and command execution
  - name: Gateway
    description: APIs for managing gateway subdevice pairing, binding, and unbinding operations
  - name: Automation
    description: APIs for automation creation, editing, query, deletion, and capability query
  - name: Studio
    description: Studio statistics query API
  - name: EMS
    description: Energy Management System APIs (energy consumption trend query, energy consumption total query)

paths:

  # ────────────────────────────────────────────────────────────────
  # List Spaces
  # ────────────────────────────────────────────────────────────────
  /spaces:
    get:
      tags: [Space]
      summary: List Spaces
      description: List all child spaces under the specified parent space. Optionally include the parent space itself to flexibly meet diverse hierarchical querying needs.
      operationId: getSpaces
      x-skill-intent: space.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: parentSpaceId
          in: query
          description: Parent space ID. If empty, the response will return all top-level spaces (spaces without a parent, i.e., root nodes of the space tree).
          required: false
          schema:
            type: string
        - name: needChildren
          in: query
          description: "Whether to query for child spaces under the parent space. If parentSpaceId is not empty and needChildren is false, child spaces will not be returned (the parent space itself may be returned only when `needParentSpaceSelf` is true)."
          required: false
          schema:
            type: boolean
            default: true
        - name: needParentSpaceSelf
          in: query
          description: Whether to include the parent space itself (corresponding to parentSpaceId). This takes effect only if parentSpaceId is not empty.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Request succeeded
     
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpacesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    post:
      tags: [Space]
      summary: Create A Space
      description: Create a space. When parentSpaceId is empty, a top-level (root) space will be created; if not empty, a child space will be created under the specified parent space.
      operationId: createSpace
      x-skill-intent: space.create
      x-idempotent: false
      x-retryable: false
      x-side-effects: create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
            example:
              parentSpaceId: "space-home-001"
              name: "Living Room"
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSpaceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Update Space Name
  # ────────────────────────────────────────────────────────────────
  /spaces/name:
    post:
      tags: [Space]
      summary: Update A Space Name
      description: Update the name of the specified space.
      operationId: updateSpaceName
      x-skill-intent: space.name.update
      x-idempotent: true
      x-retryable: true
      x-side-effects: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpaceNameRequest'
            example:
              spaceId: "space-livingroom-001"
              name: "New Living Room"
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSpaceNameResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':  
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # DeviceType Collection Query
  # ────────────────────────────────────────────────────────────────
  /devices/types:
    get:
      tags: [Device]
      summary: List Device Types
      description: Get all existing device types (DeviceType) in your Aqara Studio.
      operationId: getDeviceTypes
      x-skill-intent: device.type.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Device List Query
  # ────────────────────────────────────────────────────────────────
  /devices:
    get:
      tags: [Device]
      summary: List Devices
      description: Get a list of devices under the specified space. It supports pagination and filtering conditions.
      operationId: getDevices
      x-skill-intent: device.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: spaceIds
          in: query
          description: "Space ID list. Example: spaceIds=xx1,xx2 or spaceIds=xx1&spaceIds=xx2. If empty, all devices will be queried."
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: needChildren
          in: query
          description: "Whether to query devices in child spaces. Only effective when `spaceIds` is not empty."
          required: false
          schema:
            type: boolean
            default: false
        - name: spaceAssociated
          in: query
          description: "Whether to query devices under the specified `spaceIds`.<ul><li>true: Query only devices under the specified space(s).</li><li>false: Query only devices NOT under the specified space(s) (in this case, the `spaceIds` and `needChildren` parameters are ignored).</li><li>Not set:<ul><li>If `spaceIds` is empty, queries all devices by default.</li><li>If `spaceIds` is set, queries devices under the specified space(s) by default.</li></ul></li></ul>"
          required: false
          schema:
            type: boolean
            nullable: true
        - name: state
          in: query
          description: "Device online status. <ul><li>true: Query online devices.</li><li>false: Query offline devices.</li><li>Not set: Do not filter by status.</li></ul>"
          required: false
          schema:
            type: boolean
            nullable: true
        - name: deviceTypesList
          in: query
          description: "Device type list. Example: deviceTypesList=light,switch or deviceTypesList=light&deviceTypesList=switch"
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: deviceTypesMatchMode
          in: query
          description: "Match mode for multiple device types in `deviceTypesList`: `or` means match any of the types, `and` means must match all types"
          required: false
          schema:
            type: string
            enum: [or, and]
            default: or
          example: or
        - name: deviceName
          in: query
          description: Device name fuzzy matching (case-insensitive, blank values are automatically ignored)
          required: false
          schema:
            type: string
        - name: orderBy
          in: query
          description: "Sorting method. <ul><li><code>createTime asc</code>: Sorts results by creation time in ascending order (oldest first).</li><li><code>createTime desc</code>: Sorts results by creation time in descending order (newest first).</li></ul>"
          required: false
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - name: pageNum
          in: query
          description: Page number
          required: false
          schema:
            type: integer
          example: 1
        - name: pageSize
          in: query
          description: Number of devices per page
          required: false
          schema:
            type: integer
          example: 200
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
              examples:
                devicesPage:
                  value:
                    type: GetDeviceInfoResponse
                    version: v1
                    msgId: "1751609244328"
                    code: 0
                    message: success
                    data:
                      totalCount: 3
                      pageNum: 1
                      pageSize: 200
                      data:
                        - deviceId: "device-001"
                          gatewayId: "gateway-001"
                          deviceName: "Living Room Light"
                          deviceTypesList: ["light"]
                          createTime: 1710001234567
                          state: true
                          space:
                            parentSpaceId: "space-home-001"
                            spaceId: "space-room-001"
                            name: "Living Room"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query Device Definitions (Device Details)
  # ────────────────────────────────────────────────────────────────
  /devices/definitions:
    get:
      tags: [Device]
      summary: Query Device Model Definition
      description: Get detailed model definition for specified devices, including device types, an endpoint list, property lists, etc.
      operationId: getDeviceDefinitions
      x-skill-intent: device.definition.get
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: deviceIds
          in: query
          required: true
          description: "Device ID list. Example: deviceIds=xx1,xx2 or deviceIds=xx1&deviceIds=xx2"
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDefinitionsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query Device Matching Capabilities
  # ────────────────────────────────────────────────────────────────
  /devices/capabilities:
    get:
      tags: [Device]
      summary: Query Device Matching Capabilities
      description: |
        Query the capabilities of a single device that meet the filter criteria. Only matched definitions and the current value for the corresponding traits will be returned. The full device definition will NOT be returned.

        :::tip
        - `functionCodes`, `traitCodes`, and `commandCodes` are combined using AND logic. To query for any trait or command capabilities, please send separate requests, or query the complete function definition using only `functionCodes`.
        - If only `functionCodes` are provided and neither `traitCodes` nor `commandCodes` are passed: all complete Trait and Command definitions under that Function (i.e., all leaf nodes) are returned.
        - If `traitCodes` or `commandCodes` are provided: only the Trait or Command leaves matching these criteria are returned; non-matching leaves are not returned. Commands do not include a current value.
        - If the device exists but no capabilities match, basic device info is returned with `endpoints=[]`. If the device does not exist or cannot be accessed, `data=null`.
        :::

      operationId: getMatchedDeviceCapabilities
      x-skill-intent: device.capability.match
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: deviceId
          in: query
          required: true
          description: Device ID.
          schema:
            type: string
        - name: deviceTypesList
          in: query
          required: false
          description: |
            List of device types. The API first verifies the overall type of the device, and then filters endpoints by type.   

            :::tip
            `deviceTypesList` cannot be used on its own as a capability filter.
            :::

          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: deviceTypesMatchMode
          in: query
          required: false
          description: |
            Match mode for multiple types in `deviceTypesList`:
            - `or`: Device matches any of the types.
            - `and`: Device must match all specified types simultaneously.
          schema:
            type: string
            enum: [or, and]
            default: or
          example: or
        - name: functionCodes
          in: query
          required: false
          description: |
            List of function codes.
            At least one of `functionCodes`, `traitCodes`, or `commandCodes` must be provided.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: functionCodesMatchMode
          in: query
          required: false
          description: |
            Match mode for multiple `functionCodes`:
            - `or`: Match any.
            - `and`: The result must contain all specified function codes.
          schema:
            type: string
            enum: [or, and]
            default: or
          example: or
        - name: traitCodes
          in: query
          required: false
          description: |
            List of trait codes.
            At least one of `functionCodes`, `traitCodes`, or `commandCodes` must be provided.
            If matched, will return the trait definition, current value, and last updated time.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: traitCodesMatchMode
          in: query
          required: false
          description: |
            Match mode for multiple `traitCodes`:
            - `and`: All traits must be matched within the same function.
          schema:
            type: string
            enum: [or, and]
            default: or
          example: or
        - name: commandCodes
          in: query
          required: false
          description: |
            List of command codes.
            At least one of `functionCodes`, `traitCodes`, or `commandCodes` must be provided.
            If matched, will only return the command and parameter definitions (no current values).
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: commandCodesMatchMode
          in: query
          required: false
          description: |
            Match mode for multiple `commandCodes`:
            - `and`: All commands must be matched within the same function.
          schema:
            type: string
            enum: [or, and]
            default: or
          example: or
      responses:
        '200':
          description: Request succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMatchedDeviceCapabilitiesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Control Device / Reconnect Device to a New Room / Rename Device
  # ────────────────────────────────────────────────────────────────
  /devices/trait/execute:
    post:
      tags: [Device]
      summary: Control Devices by Traits
      description: |
        Control devices by traits. You can perform the following operations:
        - Update device attributes (such as switch, temperature, etc. For functionCode and traitCode, please refer to the /devices/definitions interface)
        - Reconnect device to a new room (functionCode="EndpointLabel", traitCode="EndpointRoom")
        - Rename device (functionCode="EndpointLabel", traitCode="EndpointName")
      operationId: executeDeviceTrait
      x-skill-intent: device.trait.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitExecuteRequest'
            examples:
              executeOnOff:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCode: OnOff
                      value: true
      responses:
        '200':
          description: Request succeeded. However, it does not mean all trait values were set successfully.<br />A code value of 0 indicates that at least some operations succeeded; a non-zero code indicates all failed.<br />If data is present, it indicates the set of traits that failed to be set; if not, all traits were set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitExecuteResponse'
              examples:
                partialFailed:
                  value:
                    type: ExecuteTraitResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf7"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        code: 1103
                        message: device offline
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query trait function values
  # ────────────────────────────────────────────────────────────────
  /devices/trait/read:
    post:
      tags: [Device]
      summary: Query Trait Values
      description: Batch query the current values of specified traits.
      operationId: getTraitValues
      x-skill-intent: device.trait.read
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitReadRequest'
            examples:
              readTraits:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCodes: [OnOff]
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitValueResponse'
              examples:
                traitValueSuccess:
                  value:
                    type: GetTraitValueResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf8"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        value: true
                        time: 1710001234567
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Control devices by commands
  # ────────────────────────────────────────────────────────────────
  /devices/command/execute:
    post:
      tags: [Device]
      summary: Control Devices by Commands
      description: |
        Use commands to control device.
        The required parameters, such as endpointId, functionCode, commandCode, and fieldCode, should be obtained from the /devices/definitions API before making a control request.
      operationId: executeDeviceCommand
      x-skill-intent: device.command.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
            examples:
              executeCommand:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
      responses:
        '200':
          description: Request succeeded. However, it does not mean all commands were executed successfully.<br />A code value of 0 indicates at least some commands succeeded; a non-zero code indicates all commands failed.<br/>If data is present, it represents the collection of commands that failed; if not, all commands succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
              examples:
                commandFailed:
                  value:
                    type: ExecuteCommandResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway001"
                        endpointId: 1
                        functionCode: HubCoordination
                        commandCode: APIBindSubdeviceWithSecurityCode
                        code: 2201
                        message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Send command to device and wait for response
  # ────────────────────────────────────────────────────────────────
  /devices/command/execute/await:
    post:
      tags: [Device]
      summary: Send Command to Device and Wait for Response
      description: |
        Control the device via command and obtain the device's response from the server. <br />
        The following commands can receive responses: <br />
        `APIGetIrDeviceCategoriesForApp(40263)`  
        `APIGetBrandsByCategoryForApp(40267)`  
        `APIGetMatchTreeForApp(40268)`  
        `APIClickIrKeyForApp(40273)`  
        `APISaveMatchedRemoteInfoForApp(40292)`  
        `SetIRDeviceInfo(40288)`  
        `IRCodeMatchStatus(20591)`  
        `APICreateIrVirtualDeviceForApp(40281)`  
        `SendIrKey(40305)`
        `APIStartIrLearningForApp(40280)`  
        `IRLearnResult(20618)`  
        `APIAddIrKeyForApp(40275)`     
      operationId: executeDeviceCommandAwait
      x-skill-intent: device.command.execute.await
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteAwaitRequest'
            examples:
              executeCommandAwait:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
                  timeoutMs: 5000
      responses:
        '200':
          description: Request succeeded. The data field returns the execution and device report results for each command.
          content:
            application/json:
              schema:
