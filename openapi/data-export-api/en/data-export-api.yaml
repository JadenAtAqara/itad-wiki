          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    get:
      tags: [Automation]
      summary: List Automations
      description: Get a paginated list of automation summaries, including each automation's ID, name, enable status, and creation time.
      operationId: queryAutomationList
      x-skill-intent: automation.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - in: query
          name: definitionTypes
          required: false
          description: |
            List of automation types.    
            Supported values:
            SCRIPT_JSON: **Flow** automation created via API.  
            SCRIPT_TEXT: **Flow** automation created via the Aqara Studio Web page.  
            WHEN_IF_THEN: **Classic** automation.  
            LEGACY_FLOW: **Flow** automation (legacy version).  
            LEGACY_LINKAGE: **Logic** automation.  
            OTHER: Other automation types.    
            Example: definitionTypes=SCRIPT_JSON,LEGACY_FLOW or definitionTypes=SCRIPT_JSON&definitionTypes=LEGACY_FLOW.
            If not provided or empty, all types will be queried.
          schema:
            type: array
            items:
              type: string
              enum: [SCRIPT_JSON, SCRIPT_TEXT, WHEN_IF_THEN, LEGACY_FLOW, LEGACY_LINKAGE, OTHER]
          style: form
          explode: true
        - in: query
          name: automationName
          required: false
          description: Fuzzy match keyword for automation name; if not provided or empty, the name will not be filtered.
          schema:
            type: string
          example: Turn on the lights when coming home
        - in: query
          name: spaceIds
          required: false
          description: "Whether to query automations under the specified list of space IDs. Example: spaceIds=xx1,xx2 or spaceIds=xx1&spaceIds=xx2. If empty, automations will not be filtered by space."
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: needChildren
          required: false
          description: Whether to query automations under the specified list of space IDs. Only effective when the spaceIds parameter has a value.
          schema:
            type: boolean
            default: false
        - in: query
          name: spaceAssociated
          required: false
          description: |
            Whether to filter automations based on their association with spaces.
            - Not set (default): Do not filter by space association, return all automations.
            - true: Only return automations that are associated with spaces.
            - false: Only return automations that are not associated with any space; in this case, the spaceIds and needChildren parameters are ignored.
          schema:
            type: boolean
            nullable: true
        - in: query
          name: orderBy
          required: false
          description: |
            Sorting method. 
            - createTime asc: Sorts results by creation time in ascending order (oldest first).
            - createTime desc: Sorts results by creation time in descending order (newest first).
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - in: query
          name: pageNum
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
