  /ems/trend/device:
    post:
      tags: [EMS]
      summary: Get Energy Consumption Trend of a Device
      description: |
        Get the statistics of the energy consumption trend of a specified device within a set time interval, segmented by time dimension (1h/1d/month). The API returns the energy consumption value for each time segment.

        :::tip
        Only devices that provide energy consumption data can be queried. For details, refer to the Aqara Studio documentation on [Energy Management](https://docs.aqara.com/docs/aqara-studio/energy-management-system#prerequisites).
        :::

      operationId: getEmsTrendDevice
      x-skill-intent: ems.trend.device
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmsTrendDeviceRequest'
            examples:
              hourlyTrend:
                value:
                  startTime: 1704067200000
                  endTime: 1704153600000
                  deviceId: "device_001"
                  dimension: "1h"
      responses:
        '200':
          description: Request succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmsDeviceTrendResponse'
              examples:
                hourlyTrendSuccess:
                  value:
                    type: EmsDeviceTrendResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f010"
                    code: 0
                    message: success
                    data:
                      - startTime: "2024010100"
                        value: 1.5
                      - startTime: "2024010101"
                        value: 2.3
                      - startTime: "2024010102"
                        value: 0.8
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'

