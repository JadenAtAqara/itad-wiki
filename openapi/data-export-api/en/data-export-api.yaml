  # ────────────────────────────────────────────────────────────────
  # Query the list of manual triggers within automations
  # ────────────────────────────────────────────────────────────────
  /automations/manual-triggers:
    get:
      tags: [Automation]
      summary: Get Manual Trigger List
      description: You can query the list of manual triggers within specific automations by IDs.
      operationId: queryAutomationManualTriggerList
      x-skill-intent: automation.manual_trigger.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - in: query
          name: automationIds
          required: false
          description: |
            Automation ID list.
            Example: automationIds=xx1,xx2 or automationIds=xx1&automationIds=xx2.
            If empty, the response will return all manual triggers within the accessible automations.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: enabledOnly
          required: false
          description: "Whether to return only manual triggers under enabled automations.<br />true: Only return manual triggers of enabled automations.<br />false: Return manual triggers of all automations."
          schema:
            type: boolean
            default: false
        - in: query
          name: includeSpace
          required: false
          description: "Whether to return the current associated space of the automation to which the manual trigger belongs.<br />true: Return the current associated space of the automation.<br />false: Do not return space information."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAutomationManualTriggerListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
