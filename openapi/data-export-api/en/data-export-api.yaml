# ══════════════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════════════
components:

  responses:
    BadRequestResponse:
      description: Request parameter error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000001"
              code: 400
              message: "Parameter xxx is required"
    UnauthorizedResponse:
      description: Unauthorized or authentication expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000002"
              code: 401
              message: "Token expired. Please generate a new token"
    ForbiddenResponse:
      description: No permission to access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example: 
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000003"
              code: 403
              message: "No permission to access this resource"
    NotFoundResponse:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000004"
              code: 404
              message: "Resource not found"
    TooManyRequestsResponse:
      description: Request frequency too high
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000005"
              code: 429
              message: "Request frequency too high"
    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000006"
              code: 500
              message: "Internal server error"
    ServiceUnavailableResponse:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000007"
              code: 503
              message: "Service temporarily unavailable"
  

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Authorization: Bearer token"

  schemas:

    # ── Base Request / Response ───────────────────────────────────
    BaseResponse:
      type: object
      required: [type, version, msgId, code]
      properties:
        type:
          type: string
          description: Message type
        version:
          type: string
          description: API version
          example: v1
        msgId:
          type: string
          description: Message ID
        code:
          type: integer
          description: "Business status code, 0 indicates success"
        message:
          type: string
          description: Message

    ErrorResponse:
      description: Error response. Read code and message for details.
     
      allOf:
        - $ref: '#/components/schemas/BaseResponse'

    # ── Space ────────────────────────────────────────────────────
    SpaceNode:
      type: object
      required: [spaceId, name]
      properties:
        spaceId:
          type: string
          description: Space ID
        parentSpaceId:
          type: string
          nullable: true
          description: Parent space ID
        name:
          type: string
          description: Space name
        spatialMarking:
          type: string
          nullable: true
          description: Space tag
        children:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SpaceNode'
          description: Child space list (recursive structure)

    CreateSpaceRequest:
      type: object
      required: [name]
      properties:
        parentSpaceId:
          type: string
          nullable: true
          description: Parent space ID. When empty, a top-level (root) space will be created; if not empty, a child space will be created under the specified parent space.
        name:
          type: string
          minLength: 1
          description: Space name, cannot be an empty string.
      example:
        parentSpaceId: "space-home-001"
        name: "Living Room"

    CreateSpaceResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              description: Space ID of the newly created space.
      example:
        type: CreateSpaceResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000006"
        code: 0
        message: success
        data: "space-livingroom-001"

    UpdateSpaceNameRequest:
      type: object
      required: [spaceId, name]
      properties:
        spaceId:
          type: string
          description: Space ID.
        name:
          type: string
          description: New space name.
      example:
        spaceId: "space-livingroom-001"
        name: "New Living Room"

    UpdateSpaceNameResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              description: Empty string (Fixed).
      example:
        type: UpdateSpaceNameResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000007"
        code: 0
        message: success
        data: ""

    SpacesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SpaceNode'
      example:
        type: GetSpacesResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000005"
        code: 0
        message: success
        data:
          - spaceId: "space-home-001"
            parentSpaceId: null
            name: "My Home"
            spatialMarking: "home"
            children:
              - spaceId: "space-floor1-001"
                parentSpaceId: "space-home-001"
                name: "First Floor"
                spatialMarking: "floor"
                children: []

    # ── Device ───────────────────────────────────────────────────
    DeviceType:
      type: object
      required: [deviceType, name]
      properties:
        deviceType:
          type: string
          description: Device type code
        name:
          type: string
          description: Device type name

    DeviceInfo:
      type: object
      required: [deviceId, deviceName, deviceTypesList, createTime, state]
      properties:
        deviceId:
          type: string
          description: Device ID
        gatewayId:
          type: string
          nullable: true
          description: Gateway ID to which the device belongs
        deviceName:
          type: string
          description: Device name
        deviceTypesList:
          type: array
          items:
            type: string
          description: Device type list
        createTime:
          type: integer
          format: int64
          description: Creation time (UTC timestamp in milliseconds)
        state:
          type: boolean
          description: Online status
        space:
          $ref: '#/components/schemas/DeviceSpace'

    DeviceSpace:
      type: object
      required: [parentSpaceId, spaceId, name]
      properties:
        parentSpaceId:
          type: string
          description: Parent space ID
        spaceId:
          type: string
          description: Space ID
        name:
          type: string
          description: Space name

    DeviceDefinition:
      type: object
      required: [deviceId, name, deviceTypesList, endpoints]
      properties:
        deviceId:
          type: string
          description: Device ID
        gatewayId:
          type: string
          nullable: true
          description: |
            The gateway ID to which this device is bound.
            If `gatewayId` equals `deviceId`, it indicates that this device is itself a gateway.
            If `gatewayId` is `null` or an empty string, it means this device is a directly connected gateway without subdevices or a third-party integrated device.
        name:
          type: string
          description: Device name
        deviceTypesList:
          type: array
          items:
            type: string
          description: Device type list
        endpoints:
          type: array
          description: Endpoint list
          items:
            $ref: '#/components/schemas/Endpoint'

    DeviceDefinitionsResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeviceDefinition'
      example:
        type: GetDevicesResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000008"
        code: 0
        message: success
        data:
          - deviceId: "device-001"
            gatewayId: "gateway-001"
            name: "客厅灯"
            deviceTypesList: ["light"]
            endpoints: []

    GetMatchedDeviceCapabilitiesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceDefinition'
              nullable: true
      example:
        type: GetMatchedDeviceCapabilitiesResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000009"
        code: 0
        message: success
        data:
          deviceId: "device-001"
          gatewayId: "gateway-001"
          name: "客厅灯"
          deviceTypesList: ["light"]
          endpoints:
            - endpointId: 1
              endpointName: "主灯"
              deviceType: "light"
              functions:
                - functionCode: "ColorControl"
                  traits:
                    - traitCode: "ColorTemperature"
                      parameter:
                        type: "Integer"
                        min: 153
                        max: 500
                        supportedValues: null
                        unit: "mireds"
                        step: 1
                        readable: true
                        writable: true
                        subscribable: true
                      value: 300
                      time: 1710001234567
                  commands:
                    - commandCode: "MoveToXYColor"
                      fields:
                        - fieldCode: "ColorX"
                          parameter:
                            type: "Float"
                            min: 0
                            max: 1
                            supportedValues: null
                            unit: null
                            step: 0.001
                            mandatory: true

    DeleteDevicePointRequest:
      type: object
      required: [deviceId, endpointId, functionCode]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          minimum: 0
          description: Endpoint ID
        functionCode:
          type: string
          description: Function code

    DeleteDevicePointResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              description: Empty string after successful deletion.
              example: ""
      example:
        type: DeleteDeviceObjectResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-00000000001c"
        code: 0
        message: success
        data: ""

    VirtualDeviceAddRequest:
      type: object
      required: [name, virtualDeviceType]
      properties:
        name:
          type: string
          description: Virtual device name
        virtualDeviceType:
          type: string
          enum: [ir, lightbox]
          description: "Virtual device type.<br />`ir`: Infrared device.<br />`lightbox`: Lightbox device."

    VirtualDeviceAddData:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          description: Device ID of the newly added virtual device.

    VirtualDeviceAddResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VirtualDeviceAddData'
      example:
        type: VirtualDeviceAddResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-00000000001d"
        code: 0
        message: success
        data:
          deviceId: "virtual-device-001"

    DeviceUnbindResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              nullable: true
              description: After successful unbinding, return null or an empty string.
              example: ""
      example:
        type: DeviceUnbindResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000018"
        code: 0
        message: success
        data: null

    DeviceUnbindRequest:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          description: Device ID to unbind.

    Endpoint:
      type: object
      required: [endpointId, endpointName, deviceType, functions]
      properties:
        endpointId:
          type: integer
          description: Endpoint ID
        endpointName:
          type: string
          description: Endpoint name
        deviceType:
          type: string
          description: Device type
        functions:
          type: array
          description: Function list
          items:
            $ref: '#/components/schemas/DeviceFunction'

    DeviceFunction:
      type: object
      required: [functionCode]
      properties:
        functionCode:
          type: string
          description: Function code (e.g. LevelControl, ColorControl, Output)
        traits:
          type: array
          description: Trait list
          items:
            $ref: '#/components/schemas/Trait'
        commands:
          type: array
          description: Command list
          items:
            $ref: '#/components/schemas/Command'

    FlexibleValue:
      oneOf:
        - type: boolean
        - type: integer
        - type: number
          format: double
        - type: string
      description: |
        Dynamic value, with the specific type determined by the trait/command definition.
        Recommended rules for determining the value type:
        1) In the trait scenario, prioritize reading the parameter.type of the same level;
        2) In the command scenario, prioritize reading the corresponding field's parameter.type;
        3) When parameter.type is Enum, the value type is string;
        4) If the parameter is missing or the type is unrecognized, default to string and retain the original value.

    Trait:
      type: object
      required: [traitCode, parameter]
      properties:
        traitCode:
          type: string
          description: Trait code (e.g. CurrentLevel, ColorTemperature, OnOff)
        parameter:
          $ref: '#/components/schemas/TraitParameter'
          description: Trait parameter
        value:
          $ref: '#/components/schemas/FlexibleValue'
          description: Current value. The type is consistent with the parameter.type.
        time:
          type: integer
          format: int64
          description: Value update time (UTC timestamp in milliseconds)

    Command:
      type: object
      required: [commandCode]
      properties:
        commandCode:
          type: string
          description: Command code (e.g. MoveToXYColor)
        fields:
          type: array
          items:
            $ref: '#/components/schemas/CommandField'
          description: List of command fields

    CommandField:
      type: object
      required: [fieldCode, parameter]
      properties:
        fieldCode:
          type: string
          description: Field code (e.g. ColorX, ColorY, Time)
        parameter:
          $ref: '#/components/schemas/CommandFieldParameter'

    BaseParameter:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: |
            Data type.<br />
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Description</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Bool</td>
                  <td>Boolean</td>
                  <td>True or false (true/false).</td>
                </tr>
                <tr>
                  <td>Integer</td>
                  <td>Integer</td>
                  <td>Integer type.</td>
                </tr>
                <tr>
                  <td>Float</td>
                  <td>Float</td>
                  <td>Number with decimals.</td>
                </tr>
                <tr>
                  <td>String</td>
                  <td>String</td>
                  <td>String value.</td>
                </tr>
                <tr>
                  <td>Struct</td>
                  <td>Struct</td>
                  <td>Structured data customized by Aqara, in JSON string format.<br />It can include fields of multiple types.</td>
                </tr>
                <tr>
                  <td>Enum</td>
                  <td>Enum</td>
                  <td>Enumeration. It defines a finite set of values.</td>
                </tr>
                <tr>
                  <td>List[X]</td>
                  <td>List</td>
                  <td>List of type X, in JSON string format.<br />X can be Integer, Float, String, Struct, or Enum.</td>
                </tr>
                <tr>
                  <td>Data</td>
                  <td>Data Block</td>
                  <td>Hexadecimal string (Hex String), e.g., "0x01AB3F".</td>
                </tr>
              </tbody>
            </table>
          enum: [Bool, Float, Integer, Enum, String, Struct, "List[X]", Data]
        min:
          type: number
          description: Minimum value
          format: double
          nullable: true
        max:
          type: number
          description: Maximum value
          format: double
          nullable: true
        supportedValues:
          description: List of enum values. This field is meaningful only when parameter.type is Enum.
          type: array
          items:
            $ref: '#/components/schemas/KeyValue'
          nullable: true
        unit:
          description: Unit. This field is only meaningful when parameter.type is Integer or Float.
          type: string
          nullable: true
        step:
          description: Step size. This field is only meaningful when parameter.type is Integer or Float.
          type: number
          format: double
          nullable: true

    TraitParameter:
      description: Trait parameter
      allOf:
        - $ref: '#/components/schemas/BaseParameter'
        - type: object
          required: [readable, writable, subscribable]
          properties:
            readable:
              type: boolean
              description: Whether it is readable
              default: true
            writable:
              type: boolean
              description: Whether it is writable
              default: true
            subscribable:
              type: boolean
              description: Whether it is subscribable
              default: true

    CommandFieldParameter:
      allOf:
        - $ref: '#/components/schemas/BaseParameter'
        - type: object
          required: [mandatory]
          properties:
            mandatory:
              type: boolean
              description: Whether it is mandatory

    KeyValue:
      type: object
      description: Key-value pair
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: Key
        value:
          type: string
          description: Value

    # ── Trait Execute ────────────────────────────────────────────
    TraitExecuteRequest:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TraitExecuteItem'

    TraitExecuteItem:
      type: object
      required: [deviceId, endpointId, functionCode, traitCode, value]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: |
            Function code, e.g.:
            - Output（Switch control）
            - EndpointLabel（Device rename/room change）
        traitCode:
          type: string
          description: |
            Trait code, e.g.:
            - OnOff（Switch）
            - EndpointRoom（Device location）
            - EndpointName（Device name）
        value:
          $ref: '#/components/schemas/FlexibleValue'
          description: The target value to be set. The type is consistent with the parameter.type of the trait to be controlled.
          
    TraitExecuteResult:
      type: object
      required: [deviceId, endpointId, functionCode, traitCode, code, message]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: Function code
        traitCode:
          type: string
          description: Trait code
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Error message

    TraitExecuteResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              description: The array elements are the traits that failed to be executed.
              items:
                $ref: '#/components/schemas/TraitExecuteResult'
      example:
        type: ExecuteTraitResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000009"
        code: 0
        message: success
        data:
          - deviceId: "device-001"
            endpointId: 1
            functionCode: "Output"
            traitCode: "OnOff"
            code: 1103
            message: "device offline"

    # ── Trait Value Query ────────────────────────────────────────
    TraitReadRequest:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TraitValueQuery'

    TraitValueQuery:
      type: object
      required: [deviceId, endpointId, functionCode, traitCodes]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: Function code
        traitCodes:
          type: array
          description: List of trait codes to be queried
          items:
            type: string

    TraitValueResult:
      type: object
      required: [deviceId, endpointId, functionCode, traitCode, value, time]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: Function code
        traitCode:
          type: string
          description: Trait code
        value:
          $ref: '#/components/schemas/FlexibleValue'
          description: The current value. The type is consistent with the parameter.type of the trait.
        time:
          type: integer
          format: int64
          description: Value update time (UTC timestamp in milliseconds)

    TraitValueResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/TraitValueResult'
      example:
        type: GetTraitValueResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-00000000000d"
        code: 0
        message: success
        data:
          - deviceId: "device-001"
            endpointId: 1
            functionCode: "Output"
            traitCode: "OnOff"
            value: true
            time: 1710001234567

    # ── Command Execute ──────────────────────────────────────────
    CommandExecuteRequest:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CommandExecuteItem'

    CommandExecuteItem:
      type: object
      required: [deviceId, endpointId, functionCode, commandCode]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: "Function code, e.g.: NetworkCommissioning"
        commandCode:
          type: string
          description: "Command code, e.g.: TriggerZigbeeNetworkInfoUpload"
        args:
          type: array
          items:
            $ref: '#/components/schemas/CommandArg'
          description: Command field object list 

    CommandArg:
      type: object
      description: Command parameters
      required: [fieldCode, value]
      properties:
        fieldCode:
          type: string
          description: Field code
        value:
          $ref: '#/components/schemas/FlexibleValue'
          description: Field value. The type is consistent with the parameter.type of the corresponding field.

    CommandExecuteResult:
      type: object
      required: [deviceId, endpointId, functionCode, commandCode, code, message]
      properties:
        deviceId:
          type: string
          description: Device ID
        endpointId:
          type: integer
          description: Endpoint ID
        functionCode:
          type: string
          description: Function code
        commandCode:
          type: string
          description: Command code
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Error message

    CommandExecuteResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              description: The array elements are the commands that failed to be executed.
              items:
                $ref: '#/components/schemas/CommandExecuteResult'
      example:
        type: ExecuteCommandResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000019"
        code: 0
        message: success
        data: []

    CommandExecuteAwaitRequest:
      allOf:
        - $ref: '#/components/schemas/CommandExecuteRequest'
        - type: object
          properties:
            timeoutMs:
              type: integer
              format: int32
              description: Timeout for waiting for device command report (milliseconds); if not provided, the server default is used.
              minimum: 1000
              maximum: 10000

    CommandExecuteAwaitResult:
      type: object
      required: [deviceId, endpointId, functionCode, commandCode, code, message, responded]
      properties:
        deviceId:
          type: string
          description: Device ID.
        endpointId:
          type: integer
          description: Endpoint ID.
        functionCode:
          type: string
          description: Function code.
        commandCode:
          type: string
          description: Command code.
        code:
          type: integer
          description: Execution result code.
        message:
          type: string
          description: Execution result description.
        responded:
          type: boolean
          description: Whether the device has reported the command.
        commandReportValue:
          type: string
          description: The original string of the device command report, parsed by the calling side.
        responseTime:
          type: integer
          format: int64
          description: The time of the device command report (milliseconds, UTC).

    CommandExecuteAwaitResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CommandExecuteAwaitResult'
      example:
        type: ExecuteCommandAwaitResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-00000000001a"
        code: 0
        message: success
        data:
          - deviceId: "gateway001"
            endpointId: 1
            functionCode: NetworkCommissioning
            commandCode: TriggerZigbeeNetworkInfoUpload
            code: 0
            message: success
            responded: true
            commandReportValue: "{\"result\":\"ok\"}"
            responseTime: 1710001234567

    # ── Gateway ──────────────────────────────────────────────────
    GatewayInfo:
      type: object
      required: [deviceId, deviceName]
      properties:
        deviceId:
          type: string
          description: Gateway device ID.
        deviceName:
          type: string
          description: Gateway device name.
        supportZigbee:
          type: boolean
          description: Whether it supports Zigbee. Default or null means that it does not support Zigbee.
        supportedMatterRoles:
          type: integer
          description: |
            Supported Matter roles. Missing or null means not supported.
            This field is a bitmask. Use `supportedMatterRoles & <role value> != 0` to check if a specific role is supported:
            - 1: Matter controller
            - 2: Matter commissioner
            - 4: Thread border router
            - 8: Matter bridge
            For example, `supportedMatterRoles & 2 != 0` means Matter sub-device commissioning is supported.
          nullable: true
        space:
          $ref: '#/components/schemas/DeviceSpace'
          nullable: true
          description: Space where the gateway is located.
     
    GatewaysResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/GatewayInfo'
      example:
        type: GetGatewaysResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-00000000000e"
        code: 0
        message: success
        data:
          - deviceId: "gateway-001"
            deviceName: "Living Room Gateway M2"
            supportZigbee: true
            supportedMatterRoles: 1

    # ── Subdevice Join ────────────────────────────────────────────
    SubdeviceJoinRequest:
      type: object
      required: [gatewayId, commandCode]
      properties:
        gatewayId:
          type: string
          description: Gateway ID
        commandCode:
          type: string
          enum:
            - APIEnableSubdeviceJoining
          description: |
            Command codes for sub-device joining:
            - `APIEnableSubdeviceJoining`: Standard Zigbee device joining (e.g. triggered by pressing a button to enter join mode)
        data:
          type: object
          description: |
            Network joining parameters (JSON object). Depending on the commandCode, the required parameters are as follows:
            - `APIEnableSubdeviceJoining`: No need to provide this field.

    SubdeviceJoinResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      example:
        type: SubdeviceJoinResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000011"
        code: 0
        message: success

    SubdeviceJoinStopRequest:
      type: object
      required: [gatewayId]
      properties:
        gatewayId:
          type: string
          description: Gateway ID

    # ── Device Bind Result ────────────────────────────────────────
    GatewaySubdeviceDidFilter:
      type: object
      required: [gatewayId]
      properties:
        gatewayId:
          type: string
          description: Gateway ID
        subDeviceIds:
          type: array
          nullable: true
          description: |
            List of subdevice IDs.
            - If empty or omitted: Query all subdevices under the specified gateway.
            - If not empty: Query the specified subdevices under the specified gateway.
          items:
            type: string

    DeviceBindResultRequest:
      type: object
      required: [gatewaySubdeviceFilters]
      properties:
        protocols:
          type: array
          nullable: true
          description: Specifies the protocol types of subdevices to query. If not provided, there is no restriction on protocol types.
          items:
            type: string
            enum: [zigbee, matter]
        gatewaySubdeviceFilters:
          type: array
          description: Filters (Gateway ID and Subdevice ID)
          required: true
          items:
            $ref: '#/components/schemas/GatewaySubdeviceDidFilter'

    DeviceBindResultItem:
      type: object
      required: [deviceId, protocols, gatewayId, bindTime]
      properties:
        deviceId:
          type: string
          description: Sub-device ID
        deviceName:
          type: string
          nullable: true
          description: Sub-device name
        space:
          $ref: '#/components/schemas/DeviceSpace'
          nullable: true
          description: Space where the sub-device is located
        protocols:
          type: array
          items:
            type: string
            enum: [zigbee, matter]
          description: List of supported protocols
        gatewayId:
          type: string
          description: Associated gateway ID
        code:
          type: integer
          nullable: true
          description: Error code (returned on failure)
        message:
          type: string
          nullable: true
          description: Error message (returned on failure)
        bindTime:
          type: integer
          format: int64
          description: Join timestamp (milliseconds, UTC)

    DeviceBindResultResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeviceBindResultItem'
      example:
        type: DeviceBindResultResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000017"
        code: 0
        message: success
        data:
          - deviceId: "subdevice-001"
            deviceName: "Bedroom Temperature Sensor"
            protocols: [zigbee]
            gatewayId: "gateway-001"
            code: 0
            message: null
            bindTime: 1710001235000

    DeviceTypesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeviceType'
      example:
        type: GetDeviceTypeInfosResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000006"
        code: 0
        message: success
        data:
          - deviceType: "light"
            name: "Light"
          - deviceType: "switch"
            name: "Switch"

    DevicesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceListData'
      example:
        type: GetDeviceInfoResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000007"
        code: 0
        message: success
        data:
          totalCount: 3
          pageNum: 1
          pageSize: 200
          data:
            - deviceId: "device-001"
              gatewayId: "gateway-001"
              deviceName: "Living Room Light"
              deviceTypesList: ["light"]
              createTime: 1710001234567
              state: true
              space:
                parentSpaceId: "space-home-001"
                spaceId: "space-room-001"
                name: "Living Room"

    DeviceListData:
      type: object
      required: [totalCount, pageNum, pageSize, data]
      properties:
        totalCount:
          type: integer
          description: Total number of devices that meet the conditions
          example: 3
        pageNum:
          type: integer
          description: Current page number
          example: 1
        pageSize:
          type: integer
          description: Current page size
          example: 200
        data:
          type: array
          description: List of devices on the current page
          items:
            $ref: '#/components/schemas/DeviceInfo'
            
    # ── Automation ────────────────────────────────────────────────
    AutomationDefinitionType:
      type: string
      enum: [SCRIPT_JSON]
      description: Automation definition type. The currently supported type is SCRIPT_JSON.

    AutomationSummary:
      type: object
      required: [automationId, name, enabled, definitionType, createTime]
      properties:
        automationId:
          type: string
          description: Automation ID.
        name:
          type: string
          description: Automation name.
        enabled:
          type: boolean
          description: "Whether it is enabled. true: enabled; false: disabled."
        definitionType:
          type: string
          enum: [SCRIPT_JSON, SCRIPT_TEXT, WHEN_IF_THEN, LEGACY_FLOW, LEGACY_LINKAGE, OTHER]
          description: |
            Automation type, as follows: <br />
            - SCRIPT_JSON：**Flow** automation created via API.  
            - SCRIPT_TEXT：**Flow** automation created via Aqara Studio Web page.  
            - WHEN_IF_THEN：**Classic** automation.  
            - LEGACY_FLOW：**Flow** automation (legacy version).  
            - LEGACY_LINKAGE：**Logic** automation.  
            - OTHER：Other automation types.
        createTime:
          type: integer
          format: int64
          description: Creation time (UTC timestamp in milliseconds)
        manualTriggers:
          type: array
          nullable: true
          description: List of available manual triggers
          items:
            $ref: '#/components/schemas/AutomationManualTriggerBrief'
        space:
          allOf:
            - $ref: '#/components/schemas/SpaceNode'
          nullable: true
          description: The current associated space of the automation; if not associated with any space, it is null.

    AutomationManualTriggerBrief:
      type: object
      required: [triggerNodeId, triggerName]
      properties:
        triggerNodeId:
          type: string
          description: Manual trigger ID
        triggerName:
          type: string
          description: Manual trigger name

    AutomationManualTriggerInfo:
      type: object
      required: [automationId, automationName, triggerNodeId, triggerName, enabled, definitionType, createTime]
      properties:
        automationId:
          type: string
          description: Automation ID.
        automationName:
          type: string
          description: Automation name.
        triggerNodeId:
          type: string
          description: Manual trigger node ID.
        triggerName:
          type: string
          description: Manual trigger name.
        enabled:
          type: boolean
          description: Whether the automation is enabled.
        definitionType:
          type: string
          enum: [SCRIPT_JSON, SCRIPT_TEXT, WHEN_IF_THEN, LEGACY_FLOW, LEGACY_LINKAGE, OTHER]
          description: Automation type.
        createTime:
          type: integer
          format: int64
          description: Creation time (UTC timestamp in milliseconds)
        space:
          allOf:
            - $ref: '#/components/schemas/SpaceNode'
          nullable: true
          description: The current associated space of the automation; only returned when `includeSpace` is true, and null if not associated with any space.

    AutomationDetails:
      allOf:
        - $ref: '#/components/schemas/AutomationSummary'
        - type: object
          properties:
            config:
              type: object
              nullable: true
              description: Automation configuration details.  
                - For automations with `definitionType` of `SCRIPT_JSON`, this field contains the full configuration object of the automation.  
                - For all other automation types, an empty object is returned.
              additionalProperties: true

    AutomationListData:
      type: object
      required: [totalCount, pageNum, pageSize, data]
      properties:
        totalCount:
          type: integer
          description: Total number of automations that meet the conditions
        pageNum:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Current page size
        data:
          type: array
          description: Automation list
          items:
            $ref: '#/components/schemas/AutomationSummary'

    CreateAutomationRequest:
      type: object
      required: [definitionType, config]
      properties:
        name:
          type: string
          description: Automation name
        definitionType:
          $ref: '#/components/schemas/AutomationDefinitionType'
        config:
          type: object
          description: JSON automation script, please refer to [JSON automation script definition](../../aqara-studio/api-references/json-automation-script).
          additionalProperties: true

    UpdateAutomationRequest:
      type: object
      required: [updateMask]
      properties:
        name:
          type: string
          description: New name.
          nullable: true
        enabled:
          type: boolean
          description: "New enabled state. true: enabled; false: disabled."
          nullable: true
        config:
          type: object
          description: New configuration. Only applicable to automations with `definitionType` of `SCRIPT_JSON`.  
          nullable: true
          additionalProperties: true
        updateMask:
          type: array
          description: |
            List of parameter names to be updated. Please make sure each item in <code>updateMask</code> has a corresponding new value provided in the data object.<br />
            **Note**: `name` and `enabled` are applicable to all automations. `config` is only applicable to automations with `definitionType` of `SCRIPT_JSON`.
          items:
            type: string
            enum: [name, enabled, config]

    UpdateAutomationStatusRequest:
      type: object
      required: [automationIds, enabled]
      properties:
        automationIds:
          type: array
          description: List of automation IDs.
          minItems: 1
          items:
            type: string
        enabled:
          type: boolean
          description: "New enabled state. true: enabled; false: disabled."

    UpdateAutomationSpaceRequest:
      type: object
      required: [spaceId, automationIds]
      properties:
        spaceId:
          type: string
          minLength: 1
          description: Target space ID.
        automationIds:
          type: array
          minItems: 1
          description: List of automation IDs to update the space association.
          items:
            type: string
      example:
        spaceId: "space-livingroom-001"
        automationIds: ["auto_01HXYZABCDEF1234567890"]

    DeleteAutomationsRequest:
      type: object
      required: [automationIds]
      properties:
        automationIds:
          type: array
          description: List of automation IDs.
          minItems: 1
          items:
            type: string

    AutomationBatchFailure:
      type: object
      required: [automationId, code, message]
      properties:
        automationId:
          type: string
          description: Automation ID.
        code:
          type: integer
          description: Error code.
        message:
          type: string
          description: Error message.

    AutomationBatchResultData:
      type: object
      required: [successIds, failedItems]
      properties:
        successIds:
          type: array
          description: List of successfully updated automation IDs.
          items:
            type: string
        failedItems:
          type: array
          description: List of failed automation objects.
          items:
            $ref: '#/components/schemas/AutomationBatchFailure'

    CreateAutomationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              description: Automation ID.

    UpdateAutomationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: string
              nullable: true
              example: ""

    DeleteAutomationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationBatchResultData'

    QueryAutomationManualTriggerListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              description: List of manual triggers
              items:
                $ref: '#/components/schemas/AutomationManualTriggerInfo'

    ExecuteAutomationManualTriggerRequest:
      type: object
      required: [automationId, triggerNodeId]
      properties:
        automationId:
          type: string
          description: Automation ID.
        triggerNodeId:
          type: string
          description: ID of the manual trigger to be executed.

    ExecuteAutomationManualTriggerResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'

    UpdateAutomationStatusResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationBatchResultData'

    UpdateAutomationSpaceResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationBatchResultData'
      example:
        type: UpdateAutomationSpaceResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000026"
        code: 0
        message: success
        data:
          successIds: ["auto_01HXYZABCDEF1234567890"]
          failedItems: []

    AutomationDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationDetails'
              nullable: true

    AutomationListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationListData'

    AutomationCapabilitiesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AutomationCapabilitiesData'
      example:
        type: QueryAutomationCapabilitiesResponse
        version: v1
        msgId: "52ebd835-1b8d-48f7-ab30-741d7c1ae0ee"
        code: 0
        message: success
        data:
          devices:
            - deviceId: "lumi3.a61fca0f4da1a0bd"
              deviceName: "Edge Hub M300"
              endpoints:
                - endpointName: "Root"
                  endpointId: 1
                  properties:
                    - deviceType: "Root"
                      functionCode: "GeneralDiagnostics"
                      functionName: "GeneralDiagnostics"
                      traitCode: "AntiDeletionNotification"
                      traitName: "Accidental Deletion Prevention notification (child device)"
                      valueType: "event"
                      semanticRole: ["starter"]
                      valueRange:
                        enumRange:
                          - value: "1"
                            key: "trigger"

    AutomationCapabilitiesData:
      type: object
      nullable: true
      properties:
        devices:
          type: array
          description: List of device capabilities that can be used for automation orchestration
          items:
            $ref: '#/components/schemas/AutomationCapabilityDevice'

    AutomationCapabilityDevice:
      type: object
      required: [deviceId, deviceName, endpoints]
      properties:
        deviceId:
          type: string
          description: Device ID
        deviceName:
          type: string
          description: Device name
        endpoints:
          type: array
          description: Endpoint list
          items:
            $ref: '#/components/schemas/AutomationCapabilityEndpoint'

    AutomationCapabilityEndpoint:
      type: object
      required: [endpointName, endpointId, properties]
      properties:
        endpointName:
          type: string
          description: Endpoint name
        endpointId:
          type: integer
          description: Endpoint ID
        properties:
          type: array
          description: List of available capabilities for the endpoint (traits/events/commands)
          items:
            $ref: '#/components/schemas/AutomationCapabilityProperty'

    AutomationCapabilityProperty:
      type: object
      required: [deviceType, functionCode, functionName, valueType, semanticRole]
      properties:
        deviceType:
          type: string
          description: Device type
        functionCode:
          type: string
          description: Function code
        functionName:
          type: string
          description: Function name
        traitCode:
          type: string
          description: Trait code (common when valueType is not cmd)
        traitName:
          type: string
          description: Trait name
        commandCode:
          type: string
          description: Command code (common when valueType is cmd)
        commandName:
          type: string
          description: Command name
        valueType:
          type: string
          description: Value type (e.g. boolean/number/enum/event/cmd)
        semanticRole:
          type: array
          description: Automation roles
          items:
            type: string
            enum: [starter, condition, action]
        unit:
          type: string
          description: Unit (e.g. %, °C, lx, etc.)
        valueRange:
          $ref: '#/components/schemas/AutomationCapabilityValueRange'

    AutomationCapabilityValueRange:
      type: object
      description: Value range or enum range
      properties:
        min:
          type: number
          format: double
          description: Minimum value
        max:
          type: number
          format: double
          description: Maximum value
        enumRange:
          type: array
          items:
            $ref: '#/components/schemas/AutomationCapabilityEnumItem'

    AutomationCapabilityEnumItem:
      type: object
      description: Enum range
      required: [value, key]
      properties:
        value:
          type: string
          description: Enum value (usually a string in the API response)
        key:
          type: string
          description: Enum display text

    # ── EMS (Energy Management System) ────────────────────────────
    EmsTrendDeviceRequest:
      type: object
      required: [startTime, endTime, deviceId, dimension]
      properties:
        startTime:
          type: integer
          format: int64
          description: Start time (UTC timestamp in milliseconds).
          example: 1704067200000
        endTime:
          type: integer
          format: int64
          description: End time (UTC timestamp in milliseconds).
          example: 1704153600000
        deviceId:
          type: string
          description: Device ID.
          example: "device_001"
        dimension:
          type: string
          description: Aggregation dimension.
          enum: ["1h", "1d", "month"]
          example: "1h"

    EmsTrendSpaceRequest:
      type: object
      required: [startTime, endTime, spaceId, dimension]
      properties:
        startTime:
          type: integer
          format: int64
          description: Start time (UTC timestamp in milliseconds).
          example: 1704067200000
        endTime:
          type: integer
          format: int64
          description: End time (UTC timestamp in milliseconds).
          example: 1706745600000
        spaceId:
          type: string
          description: Space ID (automatically identifies home or room).
          example: "room_001"
        dimension:
          type: string
          description: Aggregation dimension
          enum: ["1h", "1d", "month"]
          example: "1d"

    EmsTotalDeviceRequest:
      type: object
      required: [startTime, endTime, deviceId]
      properties:
        startTime:
          type: integer
          format: int64
          description: Start time (UTC timestamp in milliseconds).
          example: 1704067200000
        endTime:
          type: integer
          format: int64
          description: End time (UTC timestamp in milliseconds).
          example: 1704153600000
        deviceId:
          type: string
          description: Device ID.
          example: "device_001"

    EmsTotalSpaceRequest:
      type: object
      required: [startTime, endTime, spaceId]
      properties:
        startTime:
          type: integer
          format: int64
          description: Start time (UTC timestamp in milliseconds).
          example: 1704067200000
        endTime:
          type: integer
          format: int64
          description: End time (UTC timestamp in milliseconds).
          example: 1706745600000
        spaceId:
          type: string
          description: Space ID (It would be automatically identified as home or room).
          example: "home_001"

    EmsTrendPoint:
      type: object
      required: [startTime, value]
      properties:
        startTime:
          type: string
          description: |
            Start time, format depends on query dimension:
            - 1h: yyyyMMddHH
            - 1d: yyyyMMdd
            - month: yyyyMM
          example: "2024010100"
        value:
          type: number
          format: double
          description: Energy consumption value in kWh within the specified time interval
          example: 1.5

    EmsTotalData:
      type: object
      required: [totalValue]
      properties:
        totalValue:
          type: number
          format: double
          description: Total energy consumption within the time interval (kWh).
          example: 45.6

    EmsDeviceTrendResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/EmsTrendPoint'
      example:
        type: EmsDeviceTrendResponse
        version: v1
        msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f010"
        code: 0
        message: success
        data:
          - startTime: "2024010100"
            value: 1.5
          - startTime: "2024010101"
            value: 2.3

    EmsSpaceTrendResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/EmsTrendPoint'
      example:
        type: EmsSpaceTrendResponse
        version: v1
        msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f011"
        code: 0
        message: success
        data:
          - startTime: "20240101"
            value: 12.5
          - startTime: "20240102"
            value: 15.3

    EmsDeviceTotalResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/EmsTotalData'
      example:
        type: EmsDeviceTotalResponse
        version: v1
        msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f012"
        code: 0
        message: success
        data:
          totalValue: 45.6

    EmsSpaceTotalResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/EmsTotalData'
      example:
        type: EmsSpaceTotalResponse
        version: v1
        msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f013"
        code: 0
        message: success
        data:
          totalValue: 156.2
    
    StudioStatisticsDimension:
      type: string
      description: Studio statistics dimension
      enum: [deviceCount, linkageCount, spaceCount, sceneCount]

    StudioStatisticsData:
      type: object
      description: Studio statistics; returns only the statistical fields requested in dimensions
      properties:
        deviceCount:
          type: integer
          description: Number of devices
          example: 128
        linkageCount:
          type: integer
          description: Number of automations
          example: 24
        spaceCount:
          type: integer
          description: Number of spaces
          example: 16
        sceneCount:
          type: integer
          description: Number of scenes
          example: 12

    StudioStatisticsResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/StudioStatisticsData'
      example:
        type: StudioStatisticsResponse
        version: v1
        msgId: "a1b2c3d4-e5f6-7890-abcd-000000000021"
        code: 0
        message: success
        data:
          deviceCount: 128
          linkageCount: 24
          spaceCount: 16
          sceneCount: 12