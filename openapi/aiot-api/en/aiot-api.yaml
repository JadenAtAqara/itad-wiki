openapi: 3.0.3
info:
  title: AIOT API
  termsOfService: https://domain.com/terms
  x-internal: true
  description: |
    AIOT API Documentation

    ## Common Request Headers
    All APIs require the following header parameters (to be attached uniformly by the client):
    | Header         | Required | Description                  |
    | -------------- | -------- | ---------------------------- |
    | Authorization  | Yes      | `Bearer accessToken`         |
    | Content-Type   | Yes      | `application/json`           |
  version: v1

servers:
  - url: '{host}/open/api/v1'
    description: AIOT API Endpoint
    variables:
      host:
        description: Please enter the Open Platform API server domain.
        default: 'https://open-usa.aqara.com'

# Global Security: All endpoints require Bearer Token
security:
  - BearerAuth: []

tags:
  - name: Subscription
    description: Subscription API (MQTT, etc.)

paths:

  # ────────────────────────────────────────────────────────────────
  # MQTT Subscription / Unsubscription
  # ────────────────────────────────────────────────────────────────
  /subscriptions/mqtt/subscribe:
    post:
      tags: [Subscription]
      summary: Get MQTT Connection Configuration
      description: |
        Call this API, providing the specified device ID, to obtain the necessary information for MQTT connection and topic subscription, including Client ID, MQTT host address, MQTT port, supported protocols, username, secret key, etc.<br />        
        Based on the returned client ID and specific rules, you can generate the corresponding topics. Together with the other returned information, use a third-party MQTT client to connect to Aqara's MQTT Broker and subscribe to these topics to receive real-time updates of the specified device's function point value changes.
      operationId: mqttSubscribe
      x-skill-intent: subscription.mqtt.subscribe
      x-idempotent: true
      x-retryable: true
      x-side-effects: subscription_create_or_refresh
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MqttSubscribeRequest'
            examples:
              subscribe:
                value:
                  deviceUniqueId: "device-unique-id-001"
                  expiresIn: 7200
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MqttSubscribeResponse'
              examples:
                subscribeSuccess:
                  value:
                    type: MqttSubscribeResponse
                    version: v1
                    msgId: "2df2f431-xxxx-4fdb-xxxx-xxxxxxxx"
                    code: 0
                    message: success
                    data:
                      clientId: "omqt.studio_16xxxxxxxxxxx9"
                      mqttHost: "mqtt.xxx.com"
                      mqttPort: "1883"
                      supportedProtocols: ["tcp"]
                      secretId: "YmFzZTY0xxxxxxxxxxxxxxxxxxJldElk"
                      secretKey: "YmFzZTY0xxxxxxxxxxxxxxxxxxxxxxleQ=="
                      expiresIn: 7200
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /subscriptions/mqtt/unsubscribe:
    post:
      tags: [Subscription]
      summary: Invalidate MQTT Connection Configuration
      description: |
        Call this API, providing the specified device ID, to invalidate the MQTT connection configuration related to the device.
      operationId: mqttUnsubscribe
      x-skill-intent: subscription.mqtt.unsubscribe
      x-idempotent: true
      x-retryable: true
      x-side-effects: subscription_delete
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MqttUnsubscribeRequest'
            examples:
              unsubscribe:
                value:
                  deviceUniqueId: "device-unique-id-001"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MqttUnsubscribeResponse'
              examples:
                unsubscribeSuccess:
                  value:
                    type: MqttUnsubscribeResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7f002"
                    code: 0
                    message: success
                    data: null
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

# ══════════════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════════════
components:

  responses:
    BadRequestResponse:
      description: Request Parameter Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000001"
              code: 400
              message: "Parameter xxx cannot be empty"
    UnauthorizedResponse:
      description: Unauthorized or Authentication Expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000002"
              code: 401
              message: "Token expired, please regenerate token"
    ForbiddenResponse:
      description: No Permission to Access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example: 
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000003"
              code: 403
              message: "No permission to access this resource"
    NotFoundResponse:
      description: Resource Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000004"
              code: 404
              message: "Resource not found"
    TooManyRequestsResponse:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000005"
              code: 429
              message: "Too many requests"
    InternalServerErrorResponse:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              type: ErrorMessage
              version: v1
              msgId: "a1b2c3d4-e5f6-7890-abcd-err000000006"
              code: 500
              message: "Internal server error"
  

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Authorization: Bearer token"

  schemas:

    # ── Base Request / Response ───────────────────────────────────
    BaseResponse:
      type: object
      required: [type, version, msgId, code]
      properties:
        type:
          type: string
          description: Message type
        version:
          type: string
          description: API version
          example: v1
        msgId:
          type: string
          description: Message ID
        code:
          type: integer
          description: "Business status code, 0 indicates success"
        message:
          type: string
          description: Message

    ErrorResponse:
      description: Error response. Read code and message for details.
      allOf:
        - $ref: '#/components/schemas/BaseResponse'

    MqttSubscribeRequest:
      type: object
      properties:
        deviceUniqueId:
          type: string
          description: Device ID. If not configured in this field, you can also pass this information in the `Device-Unique-Id` field of the request header (Header).
        expiresIn:
          type: integer
          format: int32
          description: Subscription expiration time (seconds). Valid values are [7200, 604800]; if not within the range or not provided, the default is 7200.
          minimum: 7200
          maximum: 604800

    MqttUnsubscribeRequest:
      type: object
      properties:
        deviceUniqueId:
          type: string
          description: Device ID. If not configured in this field, you can also pass this information in the `Device-Unique-Id` field of the request header (Header).

    MqttSubscribeData:
      type: object
      required: [clientId, mqttHost, mqttPort, supportedProtocols, secretId, secretKey, expiresIn]
      properties:
        clientId:
          type: string
          description: |
            MQTT Client ID. After obtaining this information, please generate the corresponding topic according to the rule `receive_${clientId}`.<br />
            Example: When `clientId` is `omqt.studio_16ce93b6fc723f0d9f0dc02f4d4a2f15_123456789`, the topic is `receive_omqt.studio_16ce93b6fc723f0d9f0dc02f4d4a2f15_123456789`.
        mqttHost:
          type: string
          description: MQTT host address.
        mqttPort:
          type: string
          description: MQTT port.
        supportedProtocols:
          type: array
          description: Supported protocols list.
          items:
            type: string
        secretId:
          type: string
          description: Base64-encoded MQTT username.
        secretKey:
          type: string
          description: Base64-encoded MQTT secret key.
        expiresIn:
          type: integer
          format: int32
          description: Subscription expiration time (seconds).

    MqttSubscribeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MqttSubscribeData'

    MqttUnsubscribeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              nullable: true
              description: null (fixed)
