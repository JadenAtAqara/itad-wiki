openapi: 3.0.3
info:
  title: AIOT API
  termsOfService: https://domain.com/terms
  x-internal: true
  description: |
    AIOT API 开放接口文档

    ## 公共请求头
    所有接口均需携带以下 Header 参数（由客户端统一附加）：   
    | Header | 必填 | 说明 |
    |--------|------|------|
    | Accesstoken | String | 否   | 通过授权获取的访问 Token。        |
    | Appid       | String | 是   | 在 [Aqara 开发者平台](https://developer.aqara.com) 创建应用时分配的 App ID。 |
    | Keyid       | String | 是   | 在 [Aqara 开发者平台](https://developer.aqara.com) 创建应用时分配的 Key ID。                   |
    | Nonce       | String | 是   | 随机字符串，每次请求都不同。     |
    | Time        | String | 是   | 请求时间戳，单位毫秒。           |
    | Sign | 是 | 请求签名。如需了解签名生成方法，请参考 [Sign 生成规则](https://opendoc.aqara.cn/docs/%E4%BA%91%E5%BC%80%E5%8F%91/API%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97/Sign%E7%94%9F%E6%88%90%E8%A7%84%E5%88%99.html)。 |
    | Lang        | Enum   | 否   | 语言，默认英文，'zh', 'en'     |
  version: v1

servers:
  - url: '{host}/v4.0/open/api'
    description: AIOT API 端点
    variables:
      host:
        description: 请输入开放平台 API 服务器域名。
        enum:
          - 'https://open-cn.aqara.com'
          - 'https://open-usa.aqara.com'
          - 'https://open-kr.aqara.com'
          - 'https://open-ru.aqara.com'
          - 'https://open-ger.aqara.com'
          - 'https://open-sg.aqara.com'
        default: 'https://open-cn.aqara.com'

tags:
  - name: Space
    description: 空间管理接口
  - name: Device
    description: 设备查询、属性读写与命令执行接口
  - name: Subscription
    description: 订阅接口（MQTT 等）

paths:

  # ────────────────────────────────────────────────────────────────
  # 查询空间列表
  # ────────────────────────────────────────────────────────────────
  /spaces:
    get:
      tags: [Space]
      summary: 查询空间列表
      description: 查询父级空间下的子空间，可选包含父空间自身
      operationId: getSpaces
      x-skill-intent: space.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
        - name: parentSpaceId
          in: query
          description: 父空间 ID。为空时返回所有顶级空间（即没有父空间的空间，属于空间树的根节点）。
          required: false
          schema:
            type: string
        - name: needChildren
          in: query
          description: 是否查询子孙空间，默认true；当 parentSpaceId 是否查询父空间下的子空间。若 parentSpaceId 非空且 needChildren 为 false，则不返回子空间（仅在 needParentSpaceSelf 为 true 时可返回父空间自身）。
          required: false
          schema:
            type: boolean
            default: true
        - name: needParentSpaceSelf
          in: query
          description: 是否包含 parentSpaceId 对应的父空间自身。仅当 parentSpaceId 非空时生效。
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpacesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags: [Space]
      summary: 创建空间
      description: 在指定父空间下创建子空间；parentSpaceId 为空时创建顶级空间
      operationId: createSpace
      x-skill-intent: space.create
      x-idempotent: false
      x-retryable: false
      x-side-effects: create
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
            example:
              parentSpaceId: "space-home-001"
              name: "客厅"
              settings:
                gmtTimeZone: "GMT+08:00"
                locationId: "123.456,78.90"
                autoAdjustDst: true
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSpaceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 修改空间名称
  # ────────────────────────────────────────────────────────────────
  /spaces/name:
    post:
      tags: [Space]
      summary: 修改空间名称
      description: 根据空间ID修改空间名称
      operationId: updateSpaceName
      x-skill-intent: space.name.update
      x-idempotent: true
      x-retryable: true
      x-side-effects: update
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpaceNameRequest'
            example:
              spaceId: "space-livingroom-001"
              name: "新客厅"
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSpaceNameResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'


  # ────────────────────────────────────────────────────────────────
  # 查询DeviceType集合
  # ────────────────────────────────────────────────────────────────
  /devices/types:
    get:
      tags: [Device]
      summary: 查询DeviceType集合
      operationId: getDeviceTypes
      x-skill-intent: device.type.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查设备信息列表
  # ────────────────────────────────────────────────────────────────
  /devices:
    get:
      tags: [Device]
      summary: 查设备信息列表
      operationId: getDevices
      x-skill-intent: device.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
        - name: spaceIds
          in: query
          description: 空间ID列表，为空查询所有设备
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: needChildren
          in: query
          description: 是否需要查询子孙空间的设备，只有传了spaceIds条件，needChildren参数才有用
          required: false
          schema:
            type: boolean
            default: false
        - name: state
          in: query
          description: 设备在线状态（缺省时不做过滤条件）
          required: false
          schema:
            type: boolean
            nullable: true
        - name: deviceTypesList
          in: query
          description: 设备类型列表
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: deviceName
          in: query
          description: 设备名称模糊匹配（不区分大小写，空白值自动忽略）
          required: false
          schema:
            type: string
        - name: orderBy
          in: query
          description: 排序方式
          required: false
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - name: pageNum
          in: query
          description: 页码
          required: false
          schema:
            type: integer
          example: 1
        - name: pageSize
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
          example: 200
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
              examples:
                devicesPage:
                  value:
                    type: GetDeviceInfoResponse
                    version: v1
                    msgId: "1751609244328"
                    code: 0
                    message: success
                    data:
                      totalCount: 3
                      pageNum: 1
                      pageSize: 200
                      data:
                        - deviceId: "device-001"
                          deviceName: "客厅灯"
                          deviceTypesList: ["light"]
                          createTime: 1710001234567
                          state: true
                          space:
                            parentSpaceId: "space-home-001"
                            spaceId: "space-room-001"
                            name: "客厅"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询设备定义（设备详细信息）
  # ────────────────────────────────────────────────────────────────
  /devices/definitions:
    get:
      tags: [Device]
      summary: 查询设备定义（设备详细信息）
      operationId: getDeviceDefinitions
      x-skill-intent: device.definition.get
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
        - name: deviceIds
          in: query
          required: true
          description: 设备ID列表（当前一次最多支持10个设备ID）
          schema:
            type: array
            maxItems: 10
            items:
              type: string
          style: form
          explode: true
        - name: includeValues
          in: query
          required: false
          description: |
            是否包含各 trait 的当前值（`value`）与上报时间（`time`）。默认 `false` 时仅返回能力定义元数据，结构与 `true` 相同但trait值value字段可能为空或是不准确的旧值；为 `true` 时会拉取设备的当前trait值。
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDefinitionsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 设备定义（数字 ID 形态，与 definitions 同类、结构不同，内部 App）
  # ────────────────────────────────────────────────────────────────
  /devices/definitions/numeric:
    get:
      tags: [Device]
      summary: 查询单设备定义（数字 ID 形态）
      description: |
        供内部 AqaraLife App 使用。与 `GET /devices/definitions` 表示**同类**设备能力信息，但本接口用另一套**树形 JSON**：
        `devices[] → eps（端点）→ funcs（功能簇 ID）→ traits / cmds`，其中 **trait、command、function、endpoint 均以整型 ID** 标识；
        具体读写值在 `traits[].args[]`、`cmds[].args[]` 中，`value` 多为字符串（含 JSON 文本、数字字符串等），`time` 为毫秒时间戳（可选）。
        `data` 还会出现 `centralGateway`、`userId`、`nid`、`spaceId` 等上下文字段。单设备：`query deviceId`（即 did）。
      operationId: getDeviceDefinitionNumeric
      x-internal: true
      x-skill-intent: device.definition.numeric.get
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
        - name: deviceId
          in: query
          required: true
          description: 设备 ID（did）
          schema:
            type: string
        - name: includeValues
          in: query
          required: false
          description: 是否拉取完整取值
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDeviceDefinitionNumericResponse'
              examples:
                numericDefinitionShape:
                  summary: 树形结构节选（真实字段组合可能更多）
                  value:
                    type: GetDeviceDefinitionNumericResponse
                    version: v1
                    msgId: "a1b2c3d4-e5f6-7890-abcd-000000000008a"
                    code: 0
                    message: success
                    data:
                      spaceId: "space.1091392905374072832.1."
                      devices:
                        - did: "matt.5d4bf57d132e34c44c60e000"
                          eps:
                            - id: 0
                              funcs:
                                - id: 128
                                  traits:
                                    - id: 32900
                                      args:
                                        - id: 1
                                          value: "Aqara Light Switch H2 EU"
                                - id: 130
                                  traits:
                                    - id: 32914
                                      args:
                                        - id: 1
                                          value: "space.1091392905374072832.1."
                            - id: 1
                              type: [1]
                              funcs:
                                - id: 131
                                  traits:
                                    - id: 32916
                                      args:
                                        - id: 1
                                          value: "0"
                                  cmds:
                                    - id: 32918
                      nid: "157543569210258538"
                      userId: "100903618050550.1091392892818497537"
                      centralGateway: "M_LEADER-4750190511643105290"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 控制设备 / 设备更换房间 / 设备改名和更换房间
  # ────────────────────────────────────────────────────────────────
  /devices/trait/execute:
    post:
      tags: [Device]
      summary: 控制设备 / 设备更换房间 / 设备改名
      description: |
        通过 trait 执行设备控制，包括：
        - 控制设备属性（如开关、温度等）
        - 设备更换房间（functionCode=EndpointLabel, traitCode=EndpointRoom）
        - 设备改名（functionCode=EndpointLabel, traitCode=EndpointName）
      operationId: executeDeviceTrait
      x-skill-intent: device.trait.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitExecuteRequest'
            examples:
              executeOnOff:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCode: OnOff
                      value: true
      responses:
        '200':
          description: 成功（data 中返回执行失败的条目）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitExecuteResponse'
              examples:
                partialFailed:
                  value:
                    type: ExecuteTraitResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf7"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        code: 1103
                        message: device offline
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # command下发设备
  # ────────────────────────────────────────────────────────────────
  /devices/command/execute:
    post:
      tags: [Device]
      summary: 设备命令执行
      description: |
        通过 command 执行设备操作
      operationId: executeDeviceCommand
      x-skill-intent: device.command.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
            examples:
              executeCommand:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
      responses:
        '200':
          description: 成功（data 中返回执行失败的条目）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
              examples:
                commandFailed:
                  value:
                    type: ExecuteCommandResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway001"
                        endpointId: 1
                        functionCode: HubCoordination
                        commandCode: APIBindSubdeviceWithSecurityCode
                        code: 2201
                        message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /devices/command/execute/await:
    post:
      tags: [Device]
      summary: 设备命令执行并等待响应
      description: |
        通过 command 执行设备操作，并在服务端等待设备命令上报数据。
      operationId: executeDeviceCommandAwait
      x-skill-intent: device.command.execute.await
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteAwaitRequest'
            examples:
              executeCommandAwait:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
      responses:
        '200':
          description: 成功（data 返回每条命令的执行及设备上报结果）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteAwaitResponse'
              examples:
                commandExecuteAwaitSuccess:
                  value:
                    type: ExecuteCommandAwaitResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfa"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway001"
                        endpointId: 1
                        functionCode: NetworkCommissioning
                        commandCode: TriggerZigbeeNetworkInfoUpload
                        code: 0
                        message: success
                        responded: true
                        commandReportValue: "{\"result\":\"ok\"}"
                        responseTime: 1710001234567
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # 查询trait功能值
  # ────────────────────────────────────────────────────────────────
  /devices/trait/read:
    post:
      tags: [Device]
      summary: 查询trait功能值
      operationId: getTraitValues
      x-skill-intent: device.trait.read
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - $ref: '#/components/parameters/Accesstoken'
        - $ref: '#/components/parameters/Appid'
        - $ref: '#/components/parameters/Keyid'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/Time'
        - $ref: '#/components/parameters/Sign'
        - $ref: '#/components/parameters/Lang'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitReadRequest'
            examples:
              readTraits:
                value:
